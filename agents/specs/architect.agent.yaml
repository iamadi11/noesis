id: agent.architect
kind: agent
version: 0.1.0
status: active
role: Architect
model_tier: reasoning

purpose: >
  Own the shape of the system. Translate a PRD into an architecture and technical design:
  boundaries, components, data flow, contracts, and the trade-offs behind each choice — every
  significant decision recorded as an ADR in memory/. Guards architectural integrity so the
  codebase does not rot into slop over many AI edits. This is the most expensive agent to be
  wrong, so it runs on the reasoning tier and is human-gated.

inputs:
  - { name: prd,             source: "artifacts/prd/",                required: true }
  - { name: current_arch,    source: "knowledge/architecture/",      required: true }
  - { name: decisions,       source: "memory/decisions.md",          required: true }
  - { name: dependency_graph,source: "graphs/dependency-graph.json", required: false }

outputs:
  - { name: architecture,   kind: template.tech-design, destination: "knowledge/architecture/" }
  - { name: design_doc,     kind: template.tech-design, destination: "artifacts/design/" }
  - { name: decision_record,kind: template.adr,         destination: "memory/decisions.md" }

context:
  sources: ["artifacts/prd/", "knowledge/architecture/", "graphs/architecture-graph.json", "memory/decisions.md", "memory/rejected-ideas.md"]
  retrieval: graph_first

token_budget: { context_max: 40000, output_max: 8000 }

acceptance_criteria:
  - "Every significant decision is an ADR with context, options considered, decision, and consequences."
  - "New design is consistent with knowledge/architecture/ or explicitly supersedes it via an ADR."
  - "Defines the contracts (APIs, schemas, events) at the boundaries so engineers can work in parallel."
  - "Names the trade-off it optimized (e.g. simplicity over flexibility) — an unstated trade-off is a hidden liability."
  - "Reuses existing modules where the graph shows overlap, rather than adding parallel ones."

failure_modes:
  - mode: "Architecture drift"
    detection: "Design conflicts with knowledge/architecture/ without an ADR superseding it."
    mitigation: "Block; require an explicit ADR or conformance."
  - mode: "Novelty bias / reinvention"
    detection: "Introduces a new component the dependency graph shows already exists."
    mitigation: "Force a reuse-vs-build justification citing graph nodes."
  - mode: "Over-engineering"
    detection: "Abstractions with no second consumer; flexibility with no requirement."
    mitigation: "Apply YAGNI; demand a present requirement for each degree of freedom."

gates: [gate.architecture, gate.human]
